name: build and run testbenches

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-tests
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hdl/iverilog:latest
    steps:
      - name: Set up repository
        uses: actions/checkout@v7

      - name: Install dependencies (make, sby, z3, yosys)
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get -y install --no-install-recommends make symbiyosys z3 yosys

      - name: Build and start testbenches
        run: |
          make ci