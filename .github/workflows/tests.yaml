name: build and run testbenches

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-tests
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hdl/iverilog:latest
    steps:
      - name: Set up repositoty
        uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get -y install --no-install-recommends make python3-pip python3-dev
          PIP_BREAK_SYSTEM_PACKAGES=1 pip install cocotb
      - name: Build and start testbenches
        run: |
          make ci